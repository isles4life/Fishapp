name: Deploy to AWS ECS

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  BACKEND_ECR_REPO: fishleague-backend
  ADMIN_ECR_REPO: fishleague-admin
  ECS_CLUSTER: fishleague
  BACKEND_SERVICE: fishleague-backend
  ADMIN_SERVICE: fishleague-admin
  BACKEND_TASK_FAMILY: fishleague-backend
  ADMIN_TASK_FAMILY: fishleague-admin
  BACKEND_CONTAINER: backend
  ADMIN_CONTAINER: admin

jobs:
  # ─── Run backend tests ───────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package.json

      - name: Install backend deps
        run: npm install
        working-directory: backend

      - name: Run tests
        run: npm test --passWithNoTests
        working-directory: backend

  # ─── Build & deploy ──────────────────────────────────────────────────────────
  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Backend image ─────────────────────────────────────────────────────
      - name: Build & push backend image
        id: build-backend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE=$ECR_REGISTRY/$BACKEND_ECR_REPO:$IMAGE_TAG
          LATEST=$ECR_REGISTRY/$BACKEND_ECR_REPO:latest
          docker build -t $IMAGE -t $LATEST ./backend
          docker push $IMAGE
          docker push $LATEST
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      # ── Admin image ───────────────────────────────────────────────────────
      - name: Build & push admin image
        id: build-admin
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE=$ECR_REGISTRY/$ADMIN_ECR_REPO:$IMAGE_TAG
          LATEST=$ECR_REGISTRY/$ADMIN_ECR_REPO:latest
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} \
            --build-arg NEXT_PUBLIC_S3_BASE=${{ secrets.NEXT_PUBLIC_S3_BASE }} \
            -t $IMAGE -t $LATEST ./admin
          docker push $IMAGE
          docker push $LATEST
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      # ── Backend ECS deploy ────────────────────────────────────────────────
      - name: Fetch backend task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition $BACKEND_TASK_FAMILY \
            --query taskDefinition > backend-task-def.json

      - name: Render new backend task definition
        id: backend-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: backend-task-def.json
          container-name: ${{ env.BACKEND_CONTAINER }}
          image: ${{ steps.build-backend.outputs.image }}

      - name: Deploy backend service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.backend-task-def.outputs.task-definition }}
          service: ${{ env.BACKEND_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      # ── Admin ECS deploy ──────────────────────────────────────────────────
      - name: Fetch admin task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition $ADMIN_TASK_FAMILY \
            --query taskDefinition > admin-task-def.json

      - name: Render new admin task definition
        id: admin-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: admin-task-def.json
          container-name: ${{ env.ADMIN_CONTAINER }}
          image: ${{ steps.build-admin.outputs.image }}

      - name: Deploy admin service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.admin-task-def.outputs.task-definition }}
          service: ${{ env.ADMIN_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
