version: '3.9'

services:
  localstack:
    image: localstack/localstack:3
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
      DEFAULT_REGION: us-west-2
    volumes:
      - ./localstack-init:/etc/localstack/init/ready.d
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fishleague
      POSTGRES_PASSWORD: fishleague_pw
      POSTGRES_DB: fishleague
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fishleague"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://fishleague:fishleague_pw@postgres:5432/fishleague
      JWT_SECRET: change_me_in_production
      AWS_REGION: us-west-2
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_ENDPOINT_URL: http://localstack:4566
      S3_PUBLIC_URL: http://localhost:4566
      S3_BUCKET: fishleague-submissions
      APPLE_BUNDLE_ID: com.yourcompany.fishleague
      ALLOWED_ORIGINS: http://localhost:3001,http://localhost:3002,null
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
      NEXT_PUBLIC_S3_BASE: http://localhost:4566/fishleague-submissions
      NEXT_PUBLIC_WEB_URL: http://localhost:3002

volumes:
  pg_data:
